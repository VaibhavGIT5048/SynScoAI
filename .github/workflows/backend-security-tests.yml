name: Backend Security Tests

on:
  push:
  pull_request:

jobs:
  pipeline-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run backend pipeline security tests
        env:
          OPENAI_API_KEY: test-key
          OPENAI_MODEL: gpt-5.4-nano
          ALLOWED_ORIGINS: http://localhost:5173
          RATE_LIMIT_PER_MINUTE_IP: "1000"
          SIM_LIMIT_PER_DAY_VISITOR: "1000"
          MAX_CONCURRENT_SIM_PER_VISITOR: "1"
          REQUEST_TIMEOUT_SECONDS: "1"
          MAX_INPUT_CHARS_TOPIC: "200"
          MAX_INPUT_CHARS_CONTEXT: "5000"
        run: pytest tests/test_pipeline_security.py -q