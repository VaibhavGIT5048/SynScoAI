[build]
  base = "synsoc-ai-frontend"
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/backend/*"
  to = "https://synsoc-api-production.up.railway.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
